<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jinpao Weight Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen pb-10">

    <div class="max-w-md mx-auto p-4">
        <header class="flex justify-between items-center mb-6 pt-4 px-2">
            <h1 class="text-2xl font-bold text-slate-800">📊 Progress</h1>
            <div class="text-right">
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Database</p>
                <p class="text-xs font-semibold text-blue-600">Google Sheets API</p>
            </div>
        </header>

        <div id="analysisResult" class="hidden grid grid-cols-2 gap-3 mb-4">
            <div class="glass-card p-4 rounded-2xl border border-white shadow-sm text-center">
                <p class="text-[10px] text-slate-500 font-bold uppercase mb-1">BMI Status</p>
                <p id="bmiValue" class="text-xl font-bold text-slate-800">-</p>
                <p id="bmiStatus" class="text-[10px] font-medium">-</p>
            </div>
            <div class="glass-card p-4 rounded-2xl border border-white shadow-sm text-center">
                <p class="text-[10px] text-slate-500 font-bold uppercase mb-1">Body Ratio (WtHR)</p>
                <p id="wthrValue" class="text-xl font-bold text-slate-800">-</p>
                <p id="wthrStatus" class="text-[10px] font-medium">-</p>
            </div>
        </div>

        <div class="glass-card rounded-3xl shadow-xl shadow-slate-200/50 p-6 mb-6 border border-white">
            <div class="mb-4">
                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 ml-1">Current Height (cm)</label>
                <input type="number" id="heightInput" placeholder="กรอกส่วนสูงของคุณ" 
                    class="w-full p-4 bg-slate-50 rounded-2xl focus:ring-2 focus:ring-green-500 outline-none text-lg font-semibold transition-all border border-slate-100">
            </div>

            <div class="grid grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 ml-1">Weight (kg)</label>
                    <input type="number" id="weight" step="0.1" placeholder="0.0" 
                        class="w-full p-4 bg-slate-50 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none text-lg font-semibold transition-all border border-slate-100">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 ml-1">Waist (inch)</label>
                    <input type="number" id="waist" step="0.1" placeholder="0.0" 
                        class="w-full p-4 bg-slate-50 rounded-2xl focus:ring-2 focus:ring-pink-500 outline-none text-lg font-semibold transition-all border border-slate-100">
                </div>
            </div>
            <button onclick="saveData()" id="btnSubmit" 
                class="w-full bg-slate-900 hover:bg-black text-white p-4 rounded-2xl font-bold transition-all active:scale-95 shadow-lg">
                บันทึกและวิเคราะห์หุ่น
            </button>
        </div>

        <div class="glass-card rounded-3xl shadow-sm p-5 border border-white">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-bold text-slate-700 text-sm">Trend Line</h3>
                <div class="flex gap-2 text-[10px] font-bold uppercase">
                    <span class="flex items-center text-blue-500">● Weight</span>
                    <span class="flex items-center text-pink-500">● Waist</span>
                </div>
            </div>
            <div class="h-64">
                <canvas id="weightChart"></canvas>
            </div>
        </div>
        
        <div id="goalSection" class="mt-4 p-5 rounded-2xl text-white hidden shadow-lg transition-all">
            <p class="text-[10px] opacity-80 uppercase font-bold tracking-widest mb-1">Target Waist: 25 inch</p>
            <p id="goalText" class="text-lg font-bold leading-tight"></p>
        </div>
    </div>

    <script>
        // *** CONFIGURATION ***
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbzPe1cKIvCjhwE3yKxj817Ykgkj9D5ipctEsXI4bjPyWiaq9EqnWWLAFUL9Yc8zXF_gtw/exec';
        const TARGET_WAIST = 25;

        // 1. เริ่มต้นเมื่อโหลดหน้าเว็บ
        window.onload = () => {
            // ดึงส่วนสูงที่เคยจำไว้ในเครื่อง
            const savedHeight = localStorage.getItem('user_height');
            if (savedHeight) document.getElementById('heightInput').value = savedHeight;
            // โหลดข้อมูลล่าสุดจาก Sheets
            loadData();
        };

        // 2. ฟังก์ชันส่งข้อมูลไปบันทึก (POST)
        async function saveData() {
            const hInput = document.getElementById('heightInput');
            const wInput = document.getElementById('weight');
            const waInput = document.getElementById('waist');
            const btn = document.getElementById('btnSubmit');

            if (!wInput.value || !waInput.value || !hInput.value) return alert('กรุณากรอกข้อมูลให้ครบครับ');

            // จำส่วนสูงไว้ใน LocalStorage
            localStorage.setItem('user_height', hInput.value);
            
            btn.disabled = true;
            btn.innerText = 'กำลังบันทึก...';

            try {
                await fetch(GAS_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ 
                        weight: parseFloat(wInput.value), 
                        waist: parseFloat(waInput.value), 
                        height: parseFloat(hInput.value) 
                    })
                });
                
                alert('บันทึกสำเร็จ!');
                wInput.value = '';
                waInput.value = '';
                loadData(); // รีเฟรชข้อมูลในแอป
            } catch (err) {
                alert('Error: ' + err);
            } finally {
                btn.disabled = false;
                btn.innerText = 'บันทึกและวิเคราะห์หุ่น';
            }
        }

        // 3. ฟังก์ชันดึงข้อมูลมาแสดงผล (GET)
        async function loadData() {
            try {
                const response = await fetch(GAS_URL);
                const data = await response.json();
                if (!data || data.length === 0) return;

                const lastEntry = data[data.length - 1];
                const h = document.getElementById('heightInput').value || 156;
                
                // วิเคราะห์หุ่น (BMI & WtHR)
                updateAnalysis(lastEntry[1], lastEntry[2], h);

                // เตรียมข้อมูลวาดกราฟ
                const labels = data.map(row => {
                    const d = new Date(row[0]);
                    return d.toLocaleDateString('th-TH', { day: 'numeric', month: 'short' });
                });
                const weights = data.map(row => row[1]);
                const waists = data.map(row => row[2]);

                renderChart(labels, weights, waists);
            } catch (err) { console.error('Fetch Error:', err); }
        }

        // 4. Logic การวิเคราะห์ร่างกาย
        function updateAnalysis(weight, waist, height) {
            document.getElementById('analysisResult').classList.remove('hidden');
            
            // คำนวณ BMI
            const bmi = (weight / ((height/100)**2)).toFixed(1);
            const bmiEl = document.getElementById('bmiValue');
            const bmiStatusEl = document.getElementById('bmiStatus');
            bmiEl.innerText = bmi;
            if(bmi < 18.5) { bmiStatusEl.innerText = 'น้ำหนักน้อย'; bmiStatusEl.className = 'text-[10px] text-blue-500 font-bold'; }
            else if(bmi < 23) { bmiStatusEl.innerText = 'น้ำหนักปกติ'; bmiStatusEl.className = 'text-[10px] text-green-500 font-bold'; }
            else if(bmi < 25) { bmiStatusEl.innerText = 'เริ่มท้วม'; bmiStatusEl.className = 'text-[10px] text-orange-500 font-bold'; }
            else { bmiStatusEl.innerText = 'เริ่มอ้วน'; bmiStatusEl.className = 'text-[10px] text-red-500 font-bold'; }

            // คำนวณ Waist-to-Height Ratio (WtHR)
            const wthr = ((waist * 2.54) / height).toFixed(2);
            document.getElementById('wthrValue').innerText = wthr;
            const wthrStatusEl = document.getElementById('wthrStatus');
            if(wthr <= 0.5) { wthrStatusEl.innerText = 'สัดส่วนดี'; wthrStatusEl.className = 'text-[10px] text-green-500 font-bold'; }
            else { wthrStatusEl.innerText = 'เริ่มมีพุง'; wthrStatusEl.className = 'text-[10px] text-red-500 font-bold'; }

            // ส่วน Goal Motivation
            const goalSection = document.getElementById('goalSection');
            goalSection.classList.remove('hidden');
            if (waist > TARGET_WAIST) {
                const diff = (waist - TARGET_WAIST).toFixed(1);
                document.getElementById('goalText').innerText = `อีก ${diff} นิ้ว จะถึงเป้าหมาย 25"! สู้ๆ ครับ`;
                goalSection.className = 'mt-4 p-5 bg-gradient-to-r from-pink-500 to-rose-500 rounded-2xl text-white shadow-lg';
            } else {
                document.getElementById('goalText').innerText = `ถึงเป้าหมาย 25 นิ้วแล้ว! ยินดีด้วยครับ 🎉`;
                goalSection.className = 'mt-4 p-5 bg-gradient-to-r from-emerald-500 to-teal-500 rounded-2xl text-white shadow-lg';
            }
        }

        // 5. วาดกราฟด้วย Chart.js
        function renderChart(labels, weights, waists) {
            const ctx = document.getElementById('weightChart').getContext('2d');
            if (window.myChart) window.myChart.destroy();
            window.myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'Weight', data: weights, borderColor: '#3b82f6', borderWidth: 3, pointRadius: 4, tension: 0.4, yAxisID: 'y' },
                        { label: 'Waist', data: waists, borderColor: '#ec4899', borderWidth: 2, borderDash: [5, 5], pointRadius: 4, tension: 0.4, yAxisID: 'y1' }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    scales: {
                        y: { type: 'linear', display: false },
                        y1: { type: 'linear', display: false },
                        x: { grid: { display: false }, ticks: { font: { size: 10 }, color: '#94a3b8' } }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }
    </script>
</body>
</html>
