<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jinpao Weight Tracker Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .progress-gradient { background: linear-gradient(90deg, #3b82f6 0%, #10b981 100%); }
    </style>
</head>
<body class="bg-slate-100 min-h-screen pb-10 text-slate-800">

    <div id="setupUser" class="hidden fixed inset-0 z-50 bg-slate-900/60 flex items-center justify-center p-6 backdrop-blur-md">
        <div class="bg-white p-8 rounded-[2rem] w-full max-w-sm shadow-2xl border border-white text-center">
            <h2 class="text-2xl font-black mb-2 uppercase tracking-tight">Login</h2>
            <p class="text-sm text-slate-500 mb-6 font-medium">กรุณาตั้งชื่อเล่นเพื่อเข้าถึงข้อมูลของคุณ</p>
            <input type="text" id="usernameInput" placeholder="ชื่อเล่นของคุณ" class="w-full p-4 bg-slate-100 rounded-2xl mb-4 outline-none focus:ring-2 focus:ring-blue-500 font-bold text-lg text-center border-none">
            <button onclick="saveUsername()" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-bold shadow-lg shadow-blue-200">เข้าสู่ระบบ</button>
        </div>
    </div>

    <div class="max-w-md mx-auto p-4">
        <header class="flex justify-between items-center mb-6 pt-4 px-2">
            <div>
                <h1 class="text-2xl font-black tracking-tight text-slate-900 uppercase">Weight Tracker</h1>
                <p id="displayUser" class="text-[10px] font-bold text-blue-600 uppercase tracking-[0.2em]"></p>
            </div>
            <button onclick="resetUser()" class="text-[10px] font-bold text-slate-400 bg-white px-3 py-1.5 rounded-full shadow-sm border border-slate-100 uppercase tracking-widest">เปลี่ยนผู้ใช้</button>
        </header>

        <div id="goalDisplay" class="glass-card p-6 rounded-[2rem] border border-white shadow-xl shadow-slate-200/50 mb-6">
            <div class="flex justify-between items-end mb-4">
                <div>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-1">Success Rate</p>
                    <p class="text-3xl font-black text-slate-900"><span id="currentWeightText">0</span> <span class="text-sm font-normal text-slate-400">/ <span id="targetWeightText">--</span> kg</span></p>
                </div>
                <div class="text-right">
                    <p id="percentText" class="text-2xl font-black text-emerald-500">0%</p>
                    <button onclick="setGoal()" class="text-[10px] font-bold text-blue-600 underline">ตั้งเป้าหมาย</button>
                </div>
            </div>
            <div class="w-full bg-slate-100 h-3 rounded-full overflow-hidden">
                <div id="progressBar" class="progress-gradient h-full transition-all duration-1000 ease-out" style="width: 0%"></div>
            </div>
            <p id="motivationalText" class="text-[11px] text-slate-500 mt-4 font-medium text-center italic"></p>
        </div>

        <div id="analysisResult" class="hidden mb-6">
            <div class="glass-card p-4 rounded-2xl border border-white shadow-sm text-center">
                <p class="text-[10px] text-slate-500 font-bold uppercase mb-1">BMI STATUS</p>
                <p id="bmiValue" class="text-2xl font-black text-slate-800">-</p>
                <p id="bmiStatusText" class="text-[10px] font-bold uppercase"></p>
            </div>
        </div>

        <div class="glass-card rounded-[2rem] shadow-xl shadow-slate-200/50 p-6 mb-6 border border-white">
            <div class="space-y-4 mb-6">
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 ml-1">ส่วนสูง (cm)</label>
                    <input type="number" id="heightInput" placeholder="0.0" class="w-full p-4 bg-slate-100 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none text-lg font-semibold border-none">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 ml-1">น้ำหนักปัจจุบัน (kg)</label>
                    <input type="number" id="weight" step="0.1" placeholder="0.0" class="w-full p-4 bg-slate-100 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none text-2xl font-black border-none">
                </div>
            </div>
            <button onclick="saveData()" id="btnSubmit" class="w-full bg-slate-900 text-white p-4 rounded-2xl font-bold shadow-lg active:scale-95 transition-all">บันทึกน้ำหนัก</button>
        </div>

        <div class="glass-card rounded-[2rem] shadow-sm p-6 border border-white">
            <h3 class="font-bold text-slate-700 text-[10px] uppercase tracking-widest mb-6">Weight Trend</h3>
            <div class="h-64"><canvas id="weightChart"></canvas></div>
        </div>
    </div>

    <script>
        const GAS_URL = 'https://script.google.com/macros/s/AKfycby-UEDbp0a4ss-JvSwL7h4si1UhuVHigYLMBb5gDyaVe4F8jTbTB5vI8A0-113WjyZUag/exec';
        let username = localStorage.getItem('app_user');
        let weightGoal = localStorage.getItem('user_weight_goal');
        let firstWeight = null;

        window.onload = () => {
            if (!username) {
                document.getElementById('setupUser').classList.remove('hidden');
            } else {
                initApp();
            }
        };

        // แก้ไข: เมื่อบันทึกชื่อแล้ว ให้เริ่มโหลดข้อมูลทันทีโดยไม่ต้อง Refresh
        function saveUsername() {
            const name = document.getElementById('usernameInput').value.trim();
            if (name) {
                username = name; // อัปเดตตัวแปรใน Memory ทันที
                localStorage.setItem('app_user', name);
                document.getElementById('setupUser').classList.add('hidden');
                initApp(); // เรียกฟังก์ชันเริ่มต้นแอปทันที
            }
        }

        function resetUser() {
            if(confirm('ต้องการเปลี่ยนชื่อผู้ใช้?')) {
                localStorage.clear();
                location.reload(); // ตัวนี้ต้อง Reload เพื่อเคลียร์สถานะทั้งหมด
            }
        }

        function initApp() {
            document.getElementById('displayUser').innerText = `User: ${username}`;
            document.getElementById('heightInput').value = localStorage.getItem('user_height') || 156;
            // ดึงเป้าหมายจากเครื่องก่อน ถ้ามี
            if (weightGoal) document.getElementById('targetWeightText').innerText = weightGoal;
            loadData(); // ดึงข้อมูลจาก Google Sheets ทันที
        }

        function setGoal() {
            const goal = prompt("เป้าหมายน้ำหนักที่ต้องการ (kg):", weightGoal || "");
            if (goal && !isNaN(goal)) {
                weightGoal = goal;
                localStorage.setItem('user_weight_goal', goal);
                document.getElementById('targetWeightText').innerText = goal;
                // คำนวณเปอร์เซ็นต์ใหม่ทันทีไม่ต้องรอ
                if (firstWeight) updateUI(parseFloat(document.getElementById('currentWeightText').innerText), parseFloat(document.getElementById('heightInput').value));
            }
        }

        async function saveData() {
            const h = document.getElementById('heightInput').value;
            const w = document.getElementById('weight').value;
            const btn = document.getElementById('btnSubmit');

            if (!h || !w) return alert('กรุณากรอกข้อมูลให้ครบ');
            localStorage.setItem('user_height', h);
            
            const currentW = parseFloat(w);
            const currentH = parseFloat(h);

            btn.disabled = true;
            btn.innerHTML = '<span class="animate-pulse">กำลังซิงค์...</span>';

            // Optimistic Update: อัปเดตกราฟและตัวเลขบนหน้าจอทันที (ไม่ต้องรอ Server)
            updateUI(currentW, currentH);
            if (window.myChart) {
                const today = new Date().toLocaleDateString('th-TH', {day:'numeric', month:'short'});
                window.myChart.data.labels.push(today);
                window.myChart.data.datasets[0].data.push(currentW);
                window.myChart.update();
            }

            try {
                await fetch(GAS_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ 
                        weight: currentW, 
                        height: currentH, 
                        username: username, 
                        goal: weightGoal || 0 
                    })
                });
                document.getElementById('weight').value = '';
                // หน่วงเวลาเล็กน้อยเพื่อให้ Google Sheets ประมวลผลเสร็จแล้วค่อยดึงข้อมูลจริงมา Re-check
                setTimeout(loadData, 2000);
            } catch (err) { console.error(err); }
            finally { 
                btn.disabled = false; 
                btn.innerText = 'บันทึกน้ำหนัก'; 
            }
        }

        async function loadData() {
            try {
                const res = await fetch(`${GAS_URL}?user=${encodeURIComponent(username)}`);
                const data = await res.json();
                
                // ถ้าสลับ User แล้วไม่มีข้อมูล ให้เคลียร์หน้าจอรอ
                if (!data || data.length === 0) {
                    resetUIDisplay();
                    return;
                }

                const lastRow = data[data.length - 1];
                
                // อัปเดตเป้าหมายจากฐานข้อมูล (Sync ระหว่างเครื่อง)
                if (lastRow[5] && lastRow[5] != 0) {
                    weightGoal = lastRow[5];
                    localStorage.setItem('user_weight_goal', weightGoal);
                    document.getElementById('targetWeightText').innerText = weightGoal;
                }

                firstWeight = data[0][1];
                updateUI(lastRow[1], lastRow[3] || 156);
                
                const labels = data.map(r => new Date(r[0]).toLocaleDateString('th-TH', {day:'numeric', month:'short'}));
                renderChart(labels, data.map(r => r[1]));
            } catch (e) { console.error('Load error:', e); }
        }

        // ฟังก์ชันล้างหน้าจอเมื่อข้อมูลเป็นว่าง (สำหรับตอนสลับ User)
        function resetUIDisplay() {
            document.getElementById('currentWeightText').innerText = '0';
            document.getElementById('percentText').innerText = '0%';
            document.getElementById('progressBar').style.width = '0%';
            document.getElementById('analysisResult').classList.add('hidden');
            document.getElementById('motivationalText').innerText = 'ยังไม่มีข้อมูลบันทึก';
            if (window.myChart) {
                window.myChart.data.labels = [];
                window.myChart.data.datasets[0].data = [];
                window.myChart.update();
            }
        }

        function updateUI(w, h) {
            document.getElementById('currentWeightText').innerText = w;
            const bmi = (w / ((h/100)**2)).toFixed(1);
            document.getElementById('analysisResult').classList.remove('hidden');
            document.getElementById('bmiValue').innerText = bmi;
            
            let status = "ปกติ"; let color = "text-green-500";
            if(bmi < 18.5) { status = "ผอม"; color = "text-blue-500"; }
            else if(bmi >= 23 && bmi < 25) { status = "ท้วม"; color = "text-yellow-500"; }
            else if(bmi >= 25) { status = "อ้วน"; color = "text-red-500"; }
            document.getElementById('bmiStatusText').innerText = status;
            document.getElementById('bmiStatusText').className = `text-[10px] font-bold ${color}`;

            if (weightGoal && firstWeight) {
                const total = firstWeight - weightGoal;
                const lost = firstWeight - w;
                let prog = (total === 0) ? 0 : (lost / total) * 100;
                prog = Math.min(Math.max(prog, 0), 100);
                
                document.getElementById('progressBar').style.width = prog + '%';
                document.getElementById('percentText').innerText = Math.round(prog) + '%';
                document.getElementById('motivationalText').innerText = w <= weightGoal ? "ถึงเป้าหมายแล้ว 🎉" : `ลดไปแล้ว ${Math.abs(lost).toFixed(1)} kg (อีก ${Math.abs(w - weightGoal).toFixed(1)} kg)`;
            }
        }

        function renderChart(l, weights) {
            const ctx = document.getElementById('weightChart').getContext('2d');
            if (window.myChart) window.myChart.destroy();
            window.myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: l,
                    datasets: [{ 
                        label: 'Weight', data: weights, borderColor: '#3b82f6', 
                        backgroundColor: 'rgba(59, 130, 246, 0.1)', fill: true, 
                        borderWidth: 4, tension: 0.4, pointRadius: 6, pointBackgroundColor: '#3b82f6' 
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: { y: { display: false }, x: { grid: { display: false }, ticks: { font: { size: 10 } } } },
                    plugins: { legend: { display: false } }
                }
            });
        }
    </script>
</body>
</html>
