<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jinpao Fitness Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .progress-gradient { background: linear-gradient(90deg, #3b82f6 0%, #10b981 100%); }
    </style>
</head>
<body class="bg-slate-100 min-h-screen pb-10 text-slate-800">

    <div id="setupUser" class="hidden fixed inset-0 z-50 bg-slate-900/60 flex items-center justify-center p-6 backdrop-blur-md">
        <div class="bg-white p-8 rounded-[2rem] w-full max-w-sm shadow-2xl border border-white">
            <h2 class="text-2xl font-bold mb-2">ยินดีต้อนรับครับ!</h2>
            <p class="text-sm text-slate-500 mb-6">กรุณาตั้งชื่อเล่นเพื่อแยกข้อมูลคนละเครื่อง</p>
            <input type="text" id="usernameInput" placeholder="ชื่อเล่นของคุณ" class="w-full p-4 bg-slate-100 rounded-2xl mb-4 outline-none focus:ring-2 focus:ring-blue-500 font-bold text-lg">
            <button onclick="saveUsername()" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-bold shadow-lg shadow-blue-200">เริ่มใช้งาน</button>
        </div>
    </div>

    <div class="max-w-md mx-auto p-4">
        <header class="flex justify-between items-center mb-6 pt-4 px-2">
            <div>
                <h1 class="text-2xl font-black tracking-tight text-slate-900">My Progress</h1>
                <p id="displayUser" class="text-[10px] font-bold text-blue-600 uppercase tracking-[0.2em]"></p>
            </div>
            <button onclick="resetUser()" class="text-[10px] font-bold text-slate-400 bg-white px-3 py-1.5 rounded-full shadow-sm border border-slate-100">เปลี่ยนผู้ใช้</button>
        </header>

        <div id="goalDisplay" class="glass-card p-6 rounded-[2rem] border border-white shadow-xl shadow-slate-200/50 mb-6">
            <div class="flex justify-between items-end mb-4">
                <div>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-1">Weight Goal Progress</p>
                    <p class="text-3xl font-black text-slate-900"><span id="currentWeightText">0</span> <span class="text-sm font-normal text-slate-400">/ <span id="targetWeightText">--</span> kg</span></p>
                </div>
                <div class="text-right">
                    <p id="percentText" class="text-2xl font-black text-emerald-500">0%</p>
                    <button onclick="setGoal()" class="text-[10px] font-bold text-blue-600 underline">ตั้งเป้าหมาย</button>
                </div>
            </div>
            <div class="w-full bg-slate-100 h-3 rounded-full overflow-hidden">
                <div id="progressBar" class="progress-gradient h-full transition-all duration-1000 ease-out" style="width: 0%"></div>
            </div>
            <p id="motivationalText" class="text-[11px] text-slate-500 mt-4 font-medium text-center italic"></p>
        </div>

        <div id="analysisResult" class="hidden grid grid-cols-2 gap-3 mb-6">
            <div class="glass-card p-4 rounded-2xl border border-white shadow-sm text-center">
                <p class="text-[10px] text-slate-500 font-bold uppercase mb-1">BMI Status</p>
                <p id="bmiValue" class="text-xl font-bold text-slate-800">-</p>
            </div>
            <div class="glass-card p-4 rounded-2xl border border-white shadow-sm text-center">
                <p class="text-[10px] text-slate-500 font-bold uppercase mb-1">เอว (นิ้ว)</p>
                <p id="waistValue" class="text-xl font-bold text-slate-800">-</p>
            </div>
        </div>

        <div class="glass-card rounded-[2rem] shadow-xl shadow-slate-200/50 p-6 mb-6 border border-white">
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div class="col-span-2">
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 ml-1">ส่วนสูง (cm)</label>
                    <input type="number" id="heightInput" placeholder="156" class="w-full p-4 bg-slate-50 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none text-lg font-semibold border border-slate-100">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 ml-1">น้ำหนัก (kg)</label>
                    <input type="number" id="weight" step="0.1" placeholder="0.0" class="w-full p-4 bg-slate-50 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none text-lg font-semibold border border-slate-100">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 ml-1">เอว (นิ้ว)</label>
                    <input type="number" id="waist" step="0.1" placeholder="0.0" class="w-full p-4 bg-slate-50 rounded-2xl focus:ring-2 focus:ring-pink-500 outline-none text-lg font-semibold border border-slate-100">
                </div>
            </div>
            <button onclick="saveData()" id="btnSubmit" class="w-full bg-slate-900 text-white p-4 rounded-2xl font-bold shadow-lg active:scale-95 transition-all">บันทึกข้อมูลวันนี้</button>
        </div>

        <div class="glass-card rounded-[2rem] shadow-sm p-6 border border-white">
            <h3 class="font-bold text-slate-700 text-sm mb-6">Trend Line</h3>
            <div class="h-64"><canvas id="weightChart"></canvas></div>
        </div>
    </div>

    <script>
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbzUZw0MMR9gHeWgH4KoooyWGmbST8VHHoprpnNmdaKg-ZLeA5d5RE7S_V6AQWf-CsY9tQ/exec';
        let username = localStorage.getItem('app_user');
        let weightGoal = localStorage.getItem('user_weight_goal');

        window.onload = () => {
            if (!username) {
                document.getElementById('setupUser').classList.remove('hidden');
            } else {
                initApp();
            }
        };

        function saveUsername() {
            const name = document.getElementById('usernameInput').value.trim();
            if (name) {
                localStorage.setItem('app_user', name);
                document.getElementById('setupUser').classList.add('hidden');
                initApp();
            }
        }

        function resetUser() {
            if(confirm('ต้องการเปลี่ยนชื่อผู้ใช้หรือไม่? (ข้อมูลเดิมในเครื่องจะถูกล้าง)')) {
                localStorage.removeItem('app_user');
                location.reload();
            }
        }

        function initApp() {
            document.getElementById('displayUser').innerText = `User: ${username}`;
            document.getElementById('heightInput').value = localStorage.getItem('user_height') || 156;
            if (weightGoal) document.getElementById('targetWeightText').innerText = weightGoal;
            loadData();
        }

        function setGoal() {
            const goal = prompt("ตั้งเป้าหมายน้ำหนักที่คุณต้องการ (kg):", weightGoal || "");
            if (goal && !isNaN(goal)) {
                weightGoal = goal;
                localStorage.setItem('user_weight_goal', goal);
                document.getElementById('targetWeightText').innerText = goal;
                loadData();
            }
        }

        async function saveData() {
            const h = document.getElementById('heightInput').value;
            const w = document.getElementById('weight').value;
            const wa = document.getElementById('waist').value;
            const btn = document.getElementById('btnSubmit');

            if (!h || !w || !wa) return alert('กรุณากรอกข้อมูลให้ครบครับ');
            localStorage.setItem('user_height', h);
            
            btn.disabled = true; btn.innerText = 'กำลังบันทึก...';
            try {
                await fetch(GAS_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ 
                        weight: parseFloat(w), 
                        waist: parseFloat(wa), 
                        height: parseFloat(h),
                        username: username 
                    })
                });
                document.getElementById('weight').value = '';
                document.getElementById('waist').value = '';
                setTimeout(loadData, 1500);
            } catch (err) { alert('เกิดข้อผิดพลาดในการบันทึก'); }
            finally { btn.disabled = false; btn.innerText = 'บันทึกข้อมูลวันนี้'; }
        }

        async function loadData() {
            try {
                const res = await fetch(`${GAS_URL}?user=${encodeURIComponent(username)}`);
                const data = await res.json();
                if (!data || data.length === 0) {
                    document.getElementById('motivationalText').innerText = "รอรับข้อมูลบันทึกครั้งแรกจากคุณอยู่นะครับ!";
                    return;
                }

                const firstEntry = data[0];       
                const lastEntry = data[data.length - 1]; 
                
                const startWeight = firstEntry[1];
                const currentWeight = lastEntry[1];
                const currentWaist = lastEntry[2];
                const height = document.getElementById('heightInput').value || 156;

                document.getElementById('currentWeightText').innerText = currentWeight;

                if (weightGoal && startWeight != weightGoal) {
                    // สูตรคำนวณ % จากส่วนต่างเริ่มต้นเทียบเป้าหมาย
                    const totalToLose = startWeight - weightGoal;
                    const lostSoFar = startWeight - currentWeight;
                    let progress = (lostSoFar / totalToLose) * 100;
                    
                    progress = Math.min(Math.max(progress, 0), 100);
                    
                    document.getElementById('progressBar').style.width = progress.toFixed(0) + '%';
                    document.getElementById('percentText').innerText = progress.toFixed(0) + '%';
                    
                    const diff = (currentWeight - weightGoal).toFixed(1);
                    if (currentWeight <= weightGoal) {
                        document.getElementById('motivationalText').innerText = "ยินดีด้วย! คุณถึงเป้าหมายแล้ว 🎉";
                        document.getElementById('percentText').innerText = "100%";
                    } else {
                        document.getElementById('motivationalText').innerText = `ลดไปแล้ว ${(lostSoFar).toFixed(1)} kg (อีก ${diff} kg จะถึงเป้าหมาย)`;
                    }
                }

                document.getElementById('analysisResult').classList.remove('hidden');
                document.getElementById('bmiValue').innerText = (currentWeight / ((height/100)**2)).toFixed(1);
                document.getElementById('waistValue').innerText = currentWaist;

                const labels = data.map(r => new Date(r[0]).toLocaleDateString('th-TH', {day:'numeric', month:'short'}));
                renderChart(labels, data.map(r => r[1]), data.map(r => r[2]));
            } catch (e) { console.error('Load Error:', e); }
        }

        function renderChart(l, weights, waists) {
            const ctx = document.getElementById('weightChart').getContext('2d');
            if (window.myChart) window.myChart.destroy();
            window.myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: l,
                    datasets: [
                        { 
                            label: 'Weight', 
                            data: weights, 
                            borderColor: '#3b82f6', 
                            backgroundColor: 'rgba(59, 130, 246, 0.1)',
                            fill: true,
                            borderWidth: 3, 
                            tension: 0.4, 
                            yAxisID: 'y' 
                        },
                        { 
                            label: 'Waist', 
                            data: waists, 
                            borderColor: '#ec4899', 
                            borderWidth: 2, 
                            borderDash: [5,5], 
                            tension: 0.4, 
                            yAxisID: 'y1' 
                        }
                    ]
                },
                options: {
                    responsive: true, 
                    maintainAspectRatio: false,
                    scales: { 
                        y: { display: false }, 
                        y1: { display: false }, 
                        x: { grid: { display: false }, ticks: { font: { size: 10 } } } 
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }
    </script>
</body>
</html>
