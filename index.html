<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jinpao Weight Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen pb-10">

    <div class="max-w-md mx-auto p-4">
        <header class="flex justify-between items-center mb-6 pt-4 px-2">
            <h1 class="text-2xl font-bold text-slate-800">📊 Progress</h1>
            <div class="text-right">
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Database</p>
                <p class="text-xs font-semibold text-blue-600">Google Sheets API</p>
            </div>
        </header>

        <div id="analysisResult" class="hidden grid grid-cols-2 gap-3 mb-4">
            <div class="glass-card p-4 rounded-2xl border border-white shadow-sm text-center">
                <p class="text-[10px] text-slate-500 font-bold uppercase mb-1">BMI Status</p>
                <p id="bmiValue" class="text-xl font-bold text-slate-800">-</p>
                <p id="bmiStatus" class="text-[10px] font-medium">-</p>
            </div>
            <div class="glass-card p-4 rounded-2xl border border-white shadow-sm text-center">
                <p class="text-[10px] text-slate-500 font-bold uppercase mb-1">Body Ratio (WtHR)</p>
                <p id="wthrValue" class="text-xl font-bold text-slate-800">-</p>
                <p id="wthrStatus" class="text-[10px] font-medium">-</p>
            </div>
        </div>

        <div class="glass-card rounded-3xl shadow-xl shadow-slate-200/50 p-6 mb-6 border border-white">
            <div class="mb-4">
                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 ml-1">Current Height (cm)</label>
                <input type="number" id="heightInput" placeholder="156" 
                    class="w-full p-4 bg-slate-50 rounded-2xl focus:ring-2 focus:ring-green-500 outline-none text-lg font-semibold border border-slate-100">
            </div>

            <div class="grid grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 ml-1">Weight (kg)</label>
                    <input type="number" id="weight" step="0.1" placeholder="0.0" 
                        class="w-full p-4 bg-slate-50 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none text-lg font-semibold border border-slate-100">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 ml-1">Waist (inch)</label>
                    <input type="number" id="waist" step="0.1" placeholder="0.0" 
                        class="w-full p-4 bg-slate-50 rounded-2xl focus:ring-2 focus:ring-pink-500 outline-none text-lg font-semibold border border-slate-100">
                </div>
            </div>
            <button onclick="saveData()" id="btnSubmit" class="w-full bg-slate-900 text-white p-4 rounded-2xl font-bold shadow-lg active:scale-95 transition-all">บันทึกและวิเคราะห์หุ่น</button>
        </div>

        <div class="glass-card rounded-3xl shadow-sm p-5 border border-white">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-bold text-slate-700 text-sm">Trend Line</h3>
                <div class="flex gap-2 text-[10px] font-bold uppercase">
                    <span class="text-blue-500">● Weight</span>
                    <span class="text-pink-500">● Waist</span>
                </div>
            </div>
            <div class="h-64"><canvas id="weightChart"></canvas></div>
        </div>
        
        <div id="goalSection" class="mt-4 p-5 rounded-2xl text-white hidden shadow-lg">
            <p class="text-[10px] opacity-80 uppercase font-bold tracking-widest mb-1">Target: 25 inch</p>
            <p id="goalText" class="text-lg font-bold leading-tight"></p>
        </div>
    </div>

    <script>
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbyy1GtJTiKYKAxR7EAxVqfuk445Xwh-IPnwjnbDEx0MOsldwHDolNTPOZIrwXjQ_ffa4A/exec';

        window.onload = () => {
            const savedHeight = localStorage.getItem('user_height');
            if (savedHeight) document.getElementById('heightInput').value = savedHeight;
            loadData();
        };

        async function saveData() {
            const h = document.getElementById('heightInput').value;
            const w = document.getElementById('weight').value;
            const wa = document.getElementById('waist').value;
            const btn = document.getElementById('btnSubmit');

            if (!h || !w || !wa) return alert('กรุณากรอกข้อมูลให้ครบครับ');
            localStorage.setItem('user_height', h);
            btn.disabled = true; btn.innerText = 'Saving...';

            try {
                await fetch(GAS_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ weight: parseFloat(w), waist: parseFloat(wa), height: parseFloat(h) })
                });
                alert('บันทึกสำเร็จ!');
                document.getElementById('weight').value = '';
                document.getElementById('waist').value = '';
                setTimeout(loadData, 1000); // รอ 1 วิเพื่อให้ GAS บันทึกเสร็จก่อนดึงใหม่
            } catch (err) { alert('Save Error'); }
            finally { btn.disabled = false; btn.innerText = 'บันทึกและวิเคราะห์หุ่น'; }
        }

        async function loadData() {
            try {
                const res = await fetch(GAS_URL);
                const data = await res.json();
                if (!data || data.length === 0) return;

                const last = data[data.length - 1];
                const h = document.getElementById('heightInput').value || 156;
                updateAnalysis(last[1], last[2], h);

                const labels = data.map(r => new Date(r[0]).toLocaleDateString('th-TH', {day:'numeric', month:'short'}));
                renderChart(labels, data.map(r => r[1]), data.map(r => r[2]));
            } catch (err) { console.error('Load Error'); }
        }

        function updateAnalysis(w, wa, h) {
            document.getElementById('analysisResult').classList.remove('hidden');
            const bmi = (w / ((h/100)**2)).toFixed(1);
            document.getElementById('bmiValue').innerText = bmi;
            const wthr = ((wa * 2.54) / h).toFixed(2);
            document.getElementById('wthrValue').innerText = wthr;
            
            const goalSection = document.getElementById('goalSection');
            goalSection.classList.remove('hidden');
            if (wa > 25) {
                document.getElementById('goalText').innerText = `อีก ${(wa - 25).toFixed(1)} นิ้ว จะถึงเป้าหมาย!`;
                goalSection.className = 'mt-4 p-5 bg-gradient-to-r from-pink-500 to-rose-500 rounded-2xl text-white shadow-lg';
            } else {
                document.getElementById('goalText').innerText = `ถึงเป้าหมาย 25 นิ้วแล้ว 🎉`;
                goalSection.className = 'mt-4 p-5 bg-gradient-to-r from-emerald-500 to-teal-500 rounded-2xl text-white shadow-lg';
            }
        }

        function renderChart(l, weights, waists) {
            const ctx = document.getElementById('weightChart').getContext('2d');
            if (window.myChart) window.myChart.destroy();
            window.myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: l,
                    datasets: [
                        { label: 'W', data: weights, borderColor: '#3b82f6', borderWidth: 3, tension: 0.4, yAxisID: 'y' },
                        { label: 'Wa', data: waists, borderColor: '#ec4899', borderWidth: 2, borderDash: [5,5], tension: 0.4, yAxisID: 'y1' }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: { y: { display: false }, y1: { display: false }, x: { grid: { display: false } } },
                    plugins: { legend: { display: false } }
                }
            });
        }
    </script>
</body>
</html>
